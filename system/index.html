<!doctype html>
<html lang="en">
  <head>
    <link rel="apple-touch-icon" sizes="180x180" href="https://meduseld.io/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1f14" />
    <link rel="icon" type="image/x-icon" href="https://meduseld.io/static/favicon.ico" />
    <meta charset="UTF-8" />
    <title>Meduseld - System Info</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@coreui/icons@3.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://meduseld.io/static/style.css" />
  </head>
  <body class="text-light" style="background: transparent">
    <!-- Header Navigation -->
    <div class="container-fluid pt-3">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="d-flex align-items-center gap-2">
          <a href="https://services.meduseld.io" class="btn btn-warning btn-sm">
            <i class="cil-arrow-left"></i>
            Back to Services
          </a>
          <a href="https://ssh.meduseld.io" class="btn btn-dark btn-sm">
            <i class="cil-terminal"></i>
            SSH Terminal
          </a>
        </div>
      </div>
    </div>
    <div class="container py-5">
      <div class="text-center mb-5">
        <img
          src="https://meduseld.io/static/logo.png"
          style="max-height: 100px; margin-bottom: 20px"
        />
        <h1 style="color: #e6c65c; font-weight: 600">System Monitor</h1>
        <p style="opacity: 0.8">Server logs and system diagnostics</p>
      </div>

      <!-- Server Logs Panel -->
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <div class="card bg-dark border-danger">
            <div
              class="card-header d-flex justify-content-between align-items-center"
              style="background-color: rgba(220, 53, 69, 0.1); border-bottom: 2px solid #dc3545"
            >
              <h4 class="mb-0" style="color: #dc3545">
                <i class="cil-terminal me-2"></i>
                Server Logs
              </h4>
              <div class="d-flex align-items-center gap-2">
                <span class="badge bg-secondary" id="logs-status">Loading...</span>
                <button
                  id="refresh-logs-btn"
                  class="btn btn-sm btn-outline-danger"
                  onclick="fetchServerLogs()"
                  title="Refresh logs"
                  style="padding: 0.25rem 0.5rem"
                >
                  <i class="cil-reload"></i>
                </button>
              </div>
            </div>
            <div class="card-body">
              <div
                id="logs-container"
                style="
                  max-height: 600px;
                  overflow-y: auto;
                  background-color: #1a1a1a;
                  font-family: 'Courier New', monospace;
                  font-size: 0.85rem;
                  padding: 15px;
                  border-radius: 5px;
                "
              >
                <div class="text-center py-4">
                  <div class="spinner-border text-danger" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                  <p class="mt-2 text-muted">Loading server logs...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="row justify-content-center mt-5">
          <div class="col-12 col-lg-8 d-flex justify-content-center">
            <div class="trello-container text-center">
              <blockquote class="trello-board-compact">
                <a href="https://trello.com/b/9hN0SOQP/meduseld">Trello Board</a>
              </blockquote>
            </div>
          </div>
        </div>
        <script src="https://p.trellocdn.com/embed.min.js"></script>
      </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3 mt-auto" style="border-top: 1px solid rgba(230, 198, 92, 0.2)">
      <p class="text-light mb-0" style="font-size: 0.85rem">
        &copy;
        <span id="copyright-year"></span>
        <a href="https://quietarca.de" target="_blank" class="text-warning text-decoration-none">
          quietarcade
        </a>
        ~ All rights reserved.
      </p>
      <p class="text-light mb-0" style="font-size: 0.75rem">
        <a
          href="https://github.com/meduseld404/meduseld-site"
          target="_blank"
          class="text-light text-decoration-none"
        >
          v0.3.0-alpha
        </a>
      </p>
    </footer>

    <style>
      #logs-container::-webkit-scrollbar {
        width: 8px;
      }
      #logs-container::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
      }
      #logs-container::-webkit-scrollbar-thumb {
        background: #dc3545;
        border-radius: 4px;
      }
      #logs-container::-webkit-scrollbar-thumb:hover {
        background: #c82333;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const CONFIG = {
        panelUrl: 'https://panel.meduseld.io',
      };

      async function fetchServerLogs() {
        const refreshBtn = document.getElementById('refresh-logs-btn');
        const logsContainer = document.getElementById('logs-container');
        const logsStatus = document.getElementById('logs-status');

        if (refreshBtn) {
          refreshBtn.disabled = true;
          refreshBtn.innerHTML =
            '<i class="cil-reload" style="animation: spin 1s linear infinite;"></i>';
        }

        logsContainer.innerHTML =
          '<div class="text-center py-4"><div class="spinner-border text-danger" role="status"><span class="visually-hidden">Loading...</span></div><p class="mt-2 text-muted">Loading server logs...</p></div>';

        try {
          const response = await fetch(CONFIG.panelUrl + '/api/server-logs?lines=100');

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();

          if (data.error) {
            logsContainer.innerHTML = `<div class="text-center text-warning"><i class="cil-warning" style="font-size: 2rem;"></i><p class="mt-2">Unable to load server logs</p><small class="text-muted">${data.error}</small><p class="mt-3 text-info" style="font-size: 0.9rem;">The Flask app may need permission to read /var/log/syslog or the file may not exist.</p></div>`;
            logsStatus.textContent = 'Error';
            logsStatus.classList.remove('bg-success', 'bg-secondary');
            logsStatus.classList.add('bg-warning');
            return;
          }

          if (data.logs && data.logs.length > 0) {
            logsContainer.innerHTML = data.logs
              .map((line) => {
                let colorClass = 'text-light';
                if (line.includes('ERROR') || line.includes('Error')) {
                  colorClass = 'text-danger';
                } else if (line.includes('WARNING') || line.includes('Warning')) {
                  colorClass = 'text-warning';
                } else if (line.includes('INFO') || line.includes('Display:')) {
                  colorClass = 'text-info';
                }
                return `<div class="${colorClass}" style="white-space: pre-wrap; word-break: break-all; margin-bottom: 2px;">${line}</div>`;
              })
              .join('');
            logsStatus.textContent = `${data.logs.length} lines`;
            logsStatus.classList.remove('bg-danger', 'bg-secondary');
            logsStatus.classList.add('bg-success');

            // Auto-scroll to bottom
            logsContainer.scrollTop = logsContainer.scrollHeight;
          } else {
            logsContainer.innerHTML = '<p class="text-muted text-center">No logs available</p>';
            logsStatus.textContent = 'No logs';
            logsStatus.classList.remove('bg-success', 'bg-danger');
            logsStatus.classList.add('bg-secondary');
          }
        } catch (error) {
          console.error('Error fetching logs:', error);
          logsContainer.innerHTML = `<div class="text-center text-danger"><i class="cil-warning" style="font-size: 2rem;"></i><p class="mt-2">Unable to load server logs</p><small class="text-muted">${error.message}</small><p class="mt-3 text-info" style="font-size: 0.9rem;">Note: System logs require read permissions on /var/log/syslog</p></div>`;
          logsStatus.textContent = 'Error';
          logsStatus.classList.remove('bg-success', 'bg-secondary');
          logsStatus.classList.add('bg-danger');
        }

        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.innerHTML = '<i class="cil-reload"></i>';
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('copyright-year').textContent = new Date().getFullYear();
        fetchServerLogs();

        // Auto-refresh every 30 seconds
        setInterval(fetchServerLogs, 30000);
      });
    </script>
  </body>
</html>
